<div class="create-organization-container">
    <div class="header">
      <h1>Create Organization</h1>
    </div>
  
    <div class="form-container">
      <form [formGroup]="organizationForm" (ngSubmit)="onSubmit()" class="organization-form" *ngIf="organizationForm">
        <div class="form-fields-wrapper">
        <!-- Row 1: Name, Email, Phone -->
        <div class="form-row">
          <div class="form-group">
            <label for="name">Name *</label>
            <input type="text" id="name" formControlName="name" class="form-control" [class.error]="isFieldInvalid('name')" placeholder="Organization name" />
            <div class="error-message" *ngIf="isFieldInvalid('name')">{{ getFieldError('name') }}</div>
          </div>
  
          <div class="form-group">
            <label for="email">Email</label>
            <input type="email" id="email" formControlName="email" class="form-control" [class.error]="isFieldInvalid('email')" placeholder="Email" />
            <div class="error-message" *ngIf="isFieldInvalid('email')">{{ getFieldError('email') }}</div>
          </div>
  
          <div class="form-group">
            <label for="phone">Phone</label>
            <input type="tel" id="phone" formControlName="phone" class="form-control" placeholder="Phone" />
          </div>
        </div>
  
        <!-- Row 2: Address, City, Country -->
        <div class="form-row">
          <div class="form-group">
            <label for="address">Address</label>
            <input type="text" id="address" formControlName="address" class="form-control" placeholder="Address" />
          </div>
  
          <div class="form-group">
            <label for="city">City</label>
            <input type="text" id="city" formControlName="city" class="form-control" placeholder="City" />
          </div>
  
          <div class="form-group">
            <label for="country">Country</label>
            <input type="text" id="country" formControlName="country" class="form-control" placeholder="Country" />
          </div>
        </div>
        </div>
  
        <!-- Submit Button -->
        <div class="form-actions">
          <button
            type="submit"
            class="submit-btn"
            [disabled]="isSubmitting"
          >
            {{ isSubmitting ? 'Creating...' : 'Create Organization' }}
          </button>
        </div>
      </form>
    </div>
  </div>
